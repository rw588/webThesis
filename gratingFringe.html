<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sinusoidal Fringe · Square Grating Scan</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #08080e;
    color: #ddddee;
    font-family: 'Consolas', monospace;
    font-size: 14px;
    padding: 14px 16px;
  }
  h2 {
    text-align: center;
    margin-bottom: 5px;
    font-size: 16px;
    letter-spacing: 1px;
    color: #aaccff;
  }
  .subtitle {
    text-align: center;
    font-size: 11.5px;
    color: #556688;
    margin-bottom: 12px;
    line-height: 1.9;
    font-style: italic;
  }
  .canvas-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  canvas { display: block; border: 1px solid #2a2a3e; }

  /* combined-export row */
  .combined-export {
    display: flex;
    align-items: center;
    gap: 5px;
    justify-content: flex-end;
    margin: 6px 0 12px;
    max-width: 760px;
    margin-left: auto;
    margin-right: auto;
  }
  .combined-export span {
    font-size: 11px;
    font-family: Consolas, monospace;
    color: #6688aa;
  }

  .controls {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .ctrl-col {
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-width: 310px;
  }
  .slider-row { display: flex; align-items: center; gap: 6px; }
  .slider-row label {
    width: 185px;
    font-size: 13px;
    color: #ccccdd;
    text-align: right;
    flex-shrink: 0;
  }
  .slider-row input[type=range] {
    flex: 1;
    accent-color: #5588ff;
    min-width: 100px;
  }
  .slider-row .val {
    width: 58px;
    text-align: right;
    font-size: 13px;
    color: #ffcc88;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<h2>Sinusoidal Fringe Pattern Scanned by Square Grating</h2>
<div class="subtitle">
  Signal: I(x) = 1 + C · cos(2πx/d + φ) &nbsp;&nbsp;|&nbsp;&nbsp;
  Grating: G(x) = 1 if (x mod d) &lt; f·d, else 0<br>
  Transmitted: T(x₀) = f + (C/π)·sin(πf)·cos(2πx₀/d + φ + πf)
  &nbsp;&nbsp;|&nbsp;&nbsp; Output visibility = C · sinc(f)
</div>

<div class="canvas-section">
  <canvas id="topCanvas" width="760" height="278"></canvas>
  <canvas id="botCanvas" width="760" height="170"></canvas>
</div>

<!-- combined-export buttons (added after figExport.js injects per-canvas buttons) -->
<div class="combined-export" id="combinedExportRow" style="display:none;">
  <span>Combined figure:</span>
</div>

<div class="controls">
  <div class="ctrl-col">
    <div class="slider-row">
      <label>Contrast C</label>
      <input type="range" id="slC" min="0" max="1" step="0.005" value="0.8">
      <span class="val" id="valC">0.800</span>
    </div>
    <div class="slider-row">
      <label>Phase φ (rad)</label>
      <input type="range" id="slPhi" min="0" max="6.2832" step="0.02" value="0">
      <span class="val" id="valPhi">0.000</span>
    </div>
  </div>
  <div class="ctrl-col">
    <div class="slider-row">
      <label>Open fraction f</label>
      <input type="range" id="slF" min="0.01" max="0.99" step="0.005" value="0.5">
      <span class="val" id="valF">0.500</span>
    </div>
    <div class="slider-row">
      <label>Scan position x₀</label>
      <input type="range" id="slX0" min="0" max="1" step="0.002" value="0">
      <span class="val" id="valX0">0.000</span>
    </div>
  </div>
</div>

<script>
'use strict';

// ── Constants ───────────────────────────────────────────────────────────────
const d         = 1.0;
const N_SIG     = 2000;
const N_SCAN    = 600;
const N_PERIODS = 4;
const TWO_PI    = 2 * Math.PI;

// Plot margins [left, right, top, bottom]
const ML = 56, MR = 20, MT = 28, MB = 40;

// ── Canvas references ────────────────────────────────────────────────────────
const topCvs = document.getElementById('topCanvas');
const botCvs = document.getElementById('botCanvas');
const ctxT   = topCvs.getContext('2d');
const ctxB   = botCvs.getContext('2d');

// ── Precompute x arrays ──────────────────────────────────────────────────────
const xs  = new Float64Array(N_SIG);
for (let i = 0; i < N_SIG; i++) xs[i] = i / (N_SIG - 1) * N_PERIODS * d;

const x0s = new Float64Array(N_SCAN);
for (let i = 0; i < N_SCAN; i++) x0s[i] = i / (N_SCAN - 1) * d;

// ── Math helpers ─────────────────────────────────────────────────────────────
function sinc(f) {
  return Math.abs(f) < 1e-9 ? 1.0 : Math.sin(Math.PI * f) / (Math.PI * f);
}

function computeSignal(C, phi) {
  const arr = new Float64Array(N_SIG);
  for (let i = 0; i < N_SIG; i++)
    arr[i] = 1.0 + C * Math.cos(TWO_PI * xs[i] / d + phi);
  return arr;
}

function computeGrating(x0, f) {
  const arr = new Float64Array(N_SIG);
  const fd  = f * d;
  for (let i = 0; i < N_SIG; i++) {
    const v = ((xs[i] - x0) % d + d) % d;
    arr[i]  = v < fd ? 1.0 : 0.0;
  }
  return arr;
}

function computeT(C, phi, f) {
  const arr = new Float64Array(N_SCAN);
  const A   = (C / Math.PI) * Math.sin(Math.PI * f);
  const off = phi + Math.PI * f;
  for (let i = 0; i < N_SCAN; i++)
    arr[i] = f + A * Math.cos(TWO_PI * x0s[i] / d + off);
  return arr;
}

function evalT(x0, C, phi, f) {
  return f + (C / Math.PI) * Math.sin(Math.PI * f) *
             Math.cos(TWO_PI * x0 / d + phi + Math.PI * f);
}

function arrayMinMax(arr) {
  let mn = Infinity, mx = -Infinity;
  for (let i = 0; i < arr.length; i++) {
    if (arr[i] < mn) mn = arr[i];
    if (arr[i] > mx) mx = arr[i];
  }
  return [mn, mx];
}

// ── Canvas coordinate helpers ─────────────────────────────────────────────────
function cx(cvs, xVal, xMin, xMax) {
  return ML + (xVal - xMin) / (xMax - xMin) * (cvs.width - ML - MR);
}

function cy(cvs, yVal, yMin, yMax) {
  return MT + (1.0 - (yVal - yMin) / (yMax - yMin)) * (cvs.height - MT - MB);
}

// ── Drawing primitives ────────────────────────────────────────────────────────
function drawBackground(ctx, cvs) {
  ctx.clearRect(0, 0, cvs.width, cvs.height);
  ctx.fillStyle = '#090912';
  ctx.fillRect(ML, MT, cvs.width - ML - MR, cvs.height - MT - MB);
}

function drawGrid(ctx, cvs, xMin, xMax, yMin, yMax, xTickVals, nYTicks) {
  const pw = cvs.width - ML - MR;
  const ph = cvs.height - MT - MB;

  ctx.font        = '10.5px Consolas, monospace';
  ctx.fillStyle   = '#5a6a7a';
  ctx.strokeStyle = 'rgba(74,143,168,0.16)';
  ctx.lineWidth   = 1;

  ctx.textAlign = 'right';
  for (let i = 0; i <= nYTicks; i++) {
    const yV = yMin + (yMax - yMin) * i / nYTicks;
    const yC = cy(cvs, yV, yMin, yMax);
    ctx.beginPath(); ctx.moveTo(ML, yC); ctx.lineTo(ML + pw, yC); ctx.stroke();
    ctx.fillText(yV.toFixed(2), ML - 5, yC + 3.5);
  }

  ctx.textAlign = 'center';
  xTickVals.forEach(xV => {
    const xC = cx(cvs, xV, xMin, xMax);
    ctx.beginPath(); ctx.moveTo(xC, MT); ctx.lineTo(xC, MT + ph); ctx.stroke();
    const label = Number.isInteger(xV) ? xV.toFixed(0) : xV.toFixed(2);
    ctx.fillText(label, xC, MT + ph + 15);
  });

  ctx.strokeStyle = '#3a4455';
  ctx.lineWidth   = 1.5;
  ctx.strokeRect(ML, MT, pw, ph);
}

function drawAxisLabels(ctx, cvs, xLabel, yLabel, title) {
  const pw = cvs.width - ML - MR;
  const ph = cvs.height - MT - MB;

  ctx.font      = '12px Consolas, monospace';
  ctx.fillStyle = '#7a8a9a';
  ctx.textAlign = 'center';
  ctx.fillText(xLabel, ML + pw / 2, cvs.height - 4);

  ctx.save();
  ctx.translate(13, MT + ph / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText(yLabel, 0, 0);
  ctx.restore();

  if (title) {
    ctx.fillStyle = '#9ab0c8';
    ctx.font      = '11.5px Consolas, monospace';
    ctx.textAlign = 'center';
    ctx.fillText(title, ML + pw / 2, MT - 10);
  }
}

function drawCurve(ctx, cvs, xArr, yArr, xMin, xMax, yMin, yMax, color, lw, alpha) {
  const pw = cvs.width - ML - MR;
  const ph = cvs.height - MT - MB;
  ctx.save();
  ctx.beginPath(); ctx.rect(ML, MT, pw, ph); ctx.clip();
  ctx.strokeStyle = color;
  ctx.lineWidth   = lw;
  ctx.globalAlpha = alpha ?? 1.0;
  ctx.beginPath();
  ctx.moveTo(cx(cvs, xArr[0], xMin, xMax), cy(cvs, yArr[0], yMin, yMax));
  for (let i = 1; i < xArr.length; i++)
    ctx.lineTo(cx(cvs, xArr[i], xMin, xMax), cy(cvs, yArr[i], yMin, yMax));
  ctx.stroke();
  ctx.restore();
}

function drawDot(ctx, cvs, xV, yV, xMin, xMax, yMin, yMax) {
  const xC = cx(cvs, xV, xMin, xMax);
  const yC = cy(cvs, yV, yMin, yMax);
  ctx.beginPath();
  ctx.arc(xC, yC, 6.5, 0, TWO_PI);
  ctx.fillStyle   = '#ff4444';
  ctx.fill();
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth   = 1.5;
  ctx.stroke();
}

function drawLegend(ctx, cvs) {
  const pw = cvs.width - ML - MR;
  const items = [
    { color: '#4a8fd9', alpha: 1.0,  text: 'I(x) = 1 + C·cos(2πx/d + φ)' },
    { color: '#e05540', alpha: 0.80, text: 'G(x−x₀)  [open fraction f]' },
    { color: '#3cb870', alpha: 0.90, text: 'I(x)·G(x−x₀)  (transmitted light)' },
  ];
  const bw = 286, bh = items.length * 18 + 10;
  const bx = ML + pw - bw - 5;
  const by = MT + 5;

  ctx.fillStyle   = 'rgba(9,9,18,0.88)';
  ctx.strokeStyle = '#3a4455';
  ctx.lineWidth   = 1;
  ctx.fillRect(bx, by, bw, bh);
  ctx.strokeRect(bx, by, bw, bh);

  items.forEach(({ color, alpha, text }, i) => {
    const iy = by + 13 + i * 18;
    ctx.save();
    ctx.globalAlpha  = alpha;
    ctx.strokeStyle  = color;
    ctx.lineWidth    = 2;
    ctx.beginPath(); ctx.moveTo(bx + 6, iy); ctx.lineTo(bx + 26, iy); ctx.stroke();
    ctx.restore();
    ctx.fillStyle    = '#c0cede';
    ctx.font         = '10.5px Consolas, monospace';
    ctx.textAlign    = 'left';
    ctx.fillText(text, bx + 30, iy + 4);
  });
}

function drawInfoBox(ctx, cvs, lines) {
  const pw = cvs.width - ML - MR;
  const bw = 330, bh = lines.length * 16 + 12;
  const bx = ML + pw - bw - 5;
  const by = MT + 5;

  ctx.fillStyle   = 'rgba(42,32,12,0.90)';
  ctx.strokeStyle = '#957528';
  ctx.lineWidth   = 1;

  if (ctx.roundRect) {
    ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 4);
    ctx.fill(); ctx.stroke();
  } else {
    ctx.fillRect(bx, by, bw, bh);
    ctx.strokeRect(bx, by, bw, bh);
  }

  ctx.fillStyle = '#e8d890';
  ctx.font      = '11px Consolas, monospace';
  ctx.textAlign = 'left';
  lines.forEach((line, i) => ctx.fillText(line, bx + 8, by + 14 + i * 16));
}

// ── Panel render functions (accept any ctx/cvs for hi-res export) ─────────────

function getParams() {
  return {
    C:   +document.getElementById('slC').value,
    phi: +document.getElementById('slPhi').value,
    f:   +document.getElementById('slF').value,
    x0:  +document.getElementById('slX0').value,
  };
}

function renderTopPanel(ctx, cvs, params) {
  const { C, phi, f, x0 } = params;

  const sigArr  = computeSignal(C, phi);
  const gratArr = computeGrating(x0, f);
  const prodArr = new Float64Array(N_SIG);
  for (let i = 0; i < N_SIG; i++) prodArr[i] = sigArr[i] * gratArr[i];

  const xMin = 0, xMax = N_PERIODS * d;
  const yMin = -0.1, yMax = 2.35;

  drawBackground(ctx, cvs);
  drawGrid(ctx, cvs, xMin, xMax, yMin, yMax, [0, 1, 2, 3, 4], 5);
  drawAxisLabels(ctx, cvs,
    'x / period d', 'Intensity (normalised)',
    'Signal I(x), Grating G(x−x₀), and Product I(x)·G(x−x₀)');

  drawCurve(ctx, cvs, xs, sigArr,  xMin, xMax, yMin, yMax, '#4a8fd9', 1.8, 1.0);
  drawCurve(ctx, cvs, xs, gratArr, xMin, xMax, yMin, yMax, '#e05540', 1.5, 0.80);
  drawCurve(ctx, cvs, xs, prodArr, xMin, xMax, yMin, yMax, '#3cb870', 1.5, 0.90);
  drawLegend(ctx, cvs);
}

function renderBotPanel(ctx, cvs, params) {
  const { C, phi, f, x0 } = params;

  const TArr    = computeT(C, phi, f);
  const T_at_x0 = evalT(x0, C, phi, f);

  const [Tmin, Tmax] = arrayMinMax(TArr);
  const span  = Math.max(Tmax - Tmin, 1e-6);
  const mgn   = Math.max(0.02 * f, 0.005);
  const yMinB = Tmin - mgn;
  const yMaxB = Tmax + span * 0.60 + mgn;

  drawBackground(ctx, cvs);
  drawGrid(ctx, cvs, 0, d, yMinB, yMaxB, [0, 0.25, 0.5, 0.75, 1.0], 4);
  drawAxisLabels(ctx, cvs,
    'Grating position x₀ / period d', 'T(x₀)',
    'Transmitted intensity vs. grating scan position');

  drawCurve(ctx, cvs, x0s, TArr, 0, d, yMinB, yMaxB, '#d8d8d8', 2.0, 1.0);
  drawDot(ctx, cvs, x0, T_at_x0, 0, d, yMinB, yMaxB);

  const sincF = sinc(f);
  const C_out = C * sincF;
  const amp_T = Math.abs((C / Math.PI) * Math.sin(Math.PI * f));
  const vis   = f > 1e-9 ? amp_T / f : 0.0;

  drawInfoBox(ctx, cvs, [
    `sinc(f) = sin(πf)/(πf) = ${sincF.toFixed(4)}`,
    `Input contrast   C = ${C.toFixed(3)}`,
    `Output visibility  = ${vis.toFixed(4)}   =  C·sinc(f) = ${C_out.toFixed(4)}`,
  ]);
}

// ── Main render ───────────────────────────────────────────────────────────────
function render() {
  const params = getParams();
  document.getElementById('valC').textContent   = params.C.toFixed(3);
  document.getElementById('valPhi').textContent = params.phi.toFixed(3);
  document.getElementById('valF').textContent   = params.f.toFixed(3);
  document.getElementById('valX0').textContent  = params.x0.toFixed(3);

  renderTopPanel(ctxT, topCvs, params);
  renderBotPanel(ctxB, botCvs, params);
}

['slC', 'slPhi', 'slF', 'slX0'].forEach(id =>
  document.getElementById(id).addEventListener('input', render)
);

render();

// ── Register hi-res callbacks for figExport.js ────────────────────────────────
// figExport.js will upgrade the Save/Copy buttons to 3× resolution automatically.
topCvs._hiResRender = (ctx, cvs) => renderTopPanel(ctx, cvs, getParams());
botCvs._hiResRender = (ctx, cvs) => renderBotPanel(ctx, cvs, getParams());
</script>

<!-- figExport.js — adds Save PNG (3×) / Copy / Pop-out to each canvas,
     and exposes FigExport.getExportCanvas() for the combined export below -->
<script src="figExport.js"></script>

<script>
// ── Combined export (both panels stacked, 3× resolution) ─────────────────────
function buildCombinedCanvas() {
  const SCALE = (window.FigExport || {}).EXPORT_SCALE || 3;
  const GAP   = 6; // pixels between panels at original scale
  const params = getParams();

  const oc = document.createElement('canvas');
  oc.width  = topCvs.width  * SCALE;
  oc.height = (topCvs.height + GAP + botCvs.height) * SCALE;
  const ctx = oc.getContext('2d');

  // dark background fill
  ctx.fillStyle = '#08080e';
  ctx.fillRect(0, 0, oc.width, oc.height);

  // top panel
  ctx.save();
  ctx.scale(SCALE, SCALE);
  renderTopPanel(ctx, { width: topCvs.width, height: topCvs.height }, params);
  ctx.restore();

  // bottom panel, translated down
  ctx.save();
  ctx.translate(0, (topCvs.height + GAP) * SCALE);
  ctx.scale(SCALE, SCALE);
  renderBotPanel(ctx, { width: botCvs.width, height: botCvs.height }, params);
  ctx.restore();

  return oc;
}

function combinedSave() {
  const oc = buildCombinedCanvas();
  const a  = document.createElement('a');
  a.download = 'fringe_combined.png';
  a.href     = oc.toDataURL('image/png');
  a.click();
}

async function combinedCopy() {
  const oc = buildCombinedCanvas();
  const msgEl = document.getElementById('combinedMsg');
  try {
    const blob = await new Promise(res => oc.toBlob(res, 'image/png'));
    await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
    flash(msgEl, 'Copied!', '#4caf6e');
  } catch (_) {
    const url = oc.toDataURL('image/png');
    const win = window.open(url, '_blank');
    if (win) flash(msgEl, 'Opened → right-click to copy', '#ffaa44');
    else     flash(msgEl, 'Use ⬇ Save instead', '#e05540');
  }
}

function combinedPopout() {
  const oc  = buildCombinedCanvas();
  const url = oc.toDataURL('image/png');
  const SCALE = (window.FigExport || {}).EXPORT_SCALE || 3;
  const W   = Math.min(oc.width / SCALE + 40, screen.availWidth  - 60);
  const H   = Math.min(oc.height / SCALE + 80, screen.availHeight - 60);
  const win = window.open('', '_blank', `width=${W},height=${H},resizable=yes,scrollbars=yes`);
  if (!win) { alert('Pop-out blocked.'); return; }
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
<title>Combined Figure</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#08080e; display:flex; flex-direction:column;
         align-items:center; padding:16px; gap:10px; }
  img  { max-width:100%; height:auto; display:block; image-rendering:crisp-edges; }
  p    { font:11px Consolas,monospace; color:#556677; }
</style></head>
<body>
  <img src="${url}">
  <p>Right-click → Copy Image &nbsp;|&nbsp; Drag to desktop or slide to export</p>
</body></html>`);
  win.document.close();
}

function flash(el, text, color) {
  if (!el) return;
  clearTimeout(el._ft);
  el.textContent = text; el.style.color = color; el.style.opacity = '1';
  el._ft = setTimeout(() => { el.style.opacity = '0'; }, 2600);
}

// Build the combined-export row once figExport.js has finished initialising
function buildCombinedRow() {
  const BASE = [
    'background:#131320', 'border:1px solid #2e3448', 'color:#8899bb',
    'padding:2px 8px', 'cursor:pointer', 'font-size:11px',
    'border-radius:2px', 'font-family:Consolas,monospace', 'line-height:1.5',
  ].join(';');

  function cb(label, title, fn) {
    const b = document.createElement('button');
    b.textContent = label; b.title = title; b.style.cssText = BASE;
    b.addEventListener('mouseenter', () => { b.style.background='#1c1c36'; b.style.color='#ccd8ee'; });
    b.addEventListener('mouseleave', () => { b.style.background='#131320'; b.style.color='#8899bb'; });
    b.addEventListener('click', fn);
    return b;
  }

  const SCALE = (window.FigExport || {}).EXPORT_SCALE || 3;
  const row = document.getElementById('combinedExportRow');
  row.appendChild(cb(`⬇ Combined PNG (${SCALE}×)`, 'Download both panels as one PNG', combinedSave));
  row.appendChild(cb(`📋 Copy Combined (${SCALE}×)`, 'Copy combined figure to clipboard', combinedCopy));
  row.appendChild(cb('⤢ Pop out Combined', 'Open combined figure in new window', combinedPopout));

  const msg = document.createElement('span');
  msg.id = 'combinedMsg';
  msg.style.cssText = 'font-size:11px;font-family:Consolas,monospace;opacity:0;transition:opacity 0.4s;min-width:88px;';
  row.appendChild(msg);
  row.style.display = 'flex';
}

// Wait for figExport.js to load and settle, then add combined row
setTimeout(buildCombinedRow, 200);
</script>

</body>
</html>
